spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

auth:
  jwt:
    secret: TestSecretKeyForHS256MustBeAtLeast32BytesLong!!!!!
    expiration-ms: 3600000

