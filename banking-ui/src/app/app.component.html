<mat-toolbar color="primary" class="toolbar">
  <button mat-icon-button (click)="sidenav.toggle()" *ngIf="auth.isLoggedIn">
    <mat-icon>menu</mat-icon>
  </button>
  <span class="logo" routerLink="/dashboard">Banking Platform</span>
  <span class="spacer"></span>
  <ng-container *ngIf="auth.isLoggedIn">
    <span class="username">{{ auth.currentUser }}</span>
    <button mat-button (click)="logout()">
      <mat-icon>logout</mat-icon> Logout
    </button>
  </ng-container>
</mat-toolbar>

<mat-sidenav-container class="container">
  <mat-sidenav #sidenav mode="side" [opened]="auth.isLoggedIn" class="sidenav">
    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard"><mat-icon>dashboard</mat-icon> Dashboard</a>
      <a mat-list-item routerLink="/search"><mat-icon>search</mat-icon> Search</a>
      <a mat-list-item routerLink="/cards/validate"><mat-icon>credit_card</mat-icon> Validate Card</a>
      <a mat-list-item routerLink="/admin/users" *ngIf="auth.isAdmin"><mat-icon>admin_panel_settings</mat-icon> Admin</a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="content">
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
