name: Banking Platform CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Build
        run: ./gradlew build -x test

  test:
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres-mdm:
        image: postgres:15
        env:
          POSTGRES_DB: mdm_db
          POSTGRES_USER: mdm_user
          POSTGRES_PASSWORD: mdm_pass
        ports:
          - 5433:5432
        options: --health-cmd "pg_isready -U mdm_user" --health-interval 10s --health-retries 5

      postgres-ccsl:
        image: postgres:15
        env:
          POSTGRES_DB: ccsl_db
          POSTGRES_USER: ccsl_user
          POSTGRES_PASSWORD: ccsl_pass
        ports:
          - 5434:5432
        options: --health-cmd "pg_isready -U ccsl_user" --health-interval 10s --health-retries 5

      postgres-auth:
        image: postgres:15
        env:
          POSTGRES_DB: auth_db
          POSTGRES_USER: auth_user
          POSTGRES_PASSWORD: auth_pass
        ports:
          - 5435:5432
        options: --health-cmd "pg_isready -U auth_user" --health-interval 10s --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Test
        run: ./gradlew test

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: banking-ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: banking-ui/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npx ng build

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint
        run: helm lint ./helm/banking-platform

